<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meal Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .mp-btn {
            border-radius: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            transition: transform 140ms ease, background-color 140ms ease, color 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
        }

        .mp-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(15, 23, 42, 0.12);
        }

        .mp-btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.45), 0 14px 24px rgba(15, 23, 42, 0.12);
        }

        .mp-btn:visited,
        .mp-btn:hover,
        .mp-btn:active {
            text-decoration: none;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div class="w-full px-8 py-12" x-data>
        {% include "partials/header.html" %}



        <!-- Search form -->
        <form action="/api/search" method="get" class="mt-6 flex flex-wrap items-center gap-3" id="meal-search-form">
            <input type="text" name="query" placeholder="Search meals..."
                class="border border-slate-300 bg-white rounded-md px-4 py-2 min-w-[260px] text-slate-900 placeholder:text-slate-400"
                autocomplete="off" />
            <button type="submit" class="mp-btn inline-flex items-center gap-2 bg-gradient-to-r from-sky-500 to-blue-600 px-4 py-2 text-sm text-white hover:from-sky-400 hover:to-blue-500 hover:text-white focus:text-white focus:ring-2 focus:ring-sky-300 active:text-white">
                Search
            </button>
            <label class="inline-flex items-center gap-2">
                <input type="checkbox" name="include_takeout" class="h-4 w-4 text-blue-600 border-gray-300 rounded" />
                <span class="text-sm text-gray-700">Include Takeout</span>
            </label>
            <label class="inline-flex items-center gap-2">
                <input type="checkbox" name="only_favorites" class="h-4 w-4 text-blue-600 border-gray-300 rounded" />
                <span class="text-sm text-gray-700">Only Favorites</span>
            </label>
        </form>

        <div class="mt-4 flex flex-wrap items-center gap-3">
            <button id="save-selected-btn" type="button"
                class="mp-btn inline-flex items-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-600 px-4 py-2 text-sm text-white hover:from-emerald-400 hover:to-teal-500 hover:text-white focus:text-white focus:ring-2 focus:ring-emerald-300 active:text-white">
                Copy Selected To Saved Meals
            </button>
            <span id="selected-count" class="text-sm text-gray-600">0 selected</span>
            <span id="saved-count" class="text-sm text-gray-500">0 saved meals</span>
        </div>

        <div id="search-results" class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="text-sm text-gray-500">Type to search meals.</div>
        </div>

        <div class="mt-6 flex items-center gap-3">
            <span class="text-gray-500 text-sm">Searching as you type. Click to save meals for the home screen</span>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-4 right-4 z-50 px-4 py-3 rounded shadow-lg text-white" role="status"
        aria-live="polite"></div>

    <script>
        const SAVED_MEALS_STORAGE_KEY = 'mealplanner.savedMeals.v1';
        const searchForm = document.getElementById('meal-search-form');
        const searchInput = searchForm.querySelector('input[name="query"]');
        const includeTakeoutInput = searchForm.querySelector('input[name="include_takeout"]');
        const onlyFavoritesInput = searchForm.querySelector('input[name="only_favorites"]');
        const resultsContainer = document.getElementById('search-results');
        const selectedCountEl = document.getElementById('selected-count');
        const savedCountEl = document.getElementById('saved-count');
        const saveSelectedBtn = document.getElementById('save-selected-btn');
        const selectedMeals = new Set();

        function showToast(message, { type = 'ok', timeout = 1800 } = {})
        {
            const el = document.getElementById('toast');
            el.textContent = message;
            el.className = "fixed bottom-4 right-4 z-50 px-4 py-3 rounded shadow-lg text-white";
            if (type === 'error') el.classList.add('bg-red-600');
            else el.classList.add('bg-green-600');
            el.classList.remove('hidden');
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.add('hidden'), timeout);
        }

        function escapeHtml(text)
        {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function escapeAttr(text)
        {
            return escapeHtml(text).replace(/"/g, '&quot;');
        }

        function loadSavedMeals()
        {
            try
            {
                const raw = localStorage.getItem(SAVED_MEALS_STORAGE_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed.filter(x => typeof x === 'string' && x.trim()) : [];
            } catch
            {
                return [];
            }
        }

        function saveSavedMeals(items)
        {
            localStorage.setItem(SAVED_MEALS_STORAGE_KEY, JSON.stringify(items));
        }

        function updateSavedCount()
        {
            savedCountEl.textContent = `${loadSavedMeals().length} saved meals`;
        }

        function updateSelectedCount()
        {
            selectedCountEl.textContent = `${selectedMeals.size} selected`;
        }

        function addMealsToSaved(meals)
        {
            const existing = loadSavedMeals();
            const existingSet = new Set(existing.map(m => m.trim().toLowerCase()));
            let added = 0;

            for (const meal of meals)
            {
                const text = String(meal || '').trim();
                if (!text) continue;
                const key = text.toLowerCase();
                if (existingSet.has(key)) continue;
                existing.push(text);
                existingSet.add(key);
                added++;
            }

            saveSavedMeals(existing);
            updateSavedCount();
            return added;
        }

        function renderResults(results)
        {
            if (!results.length)
            {
                resultsContainer.innerHTML = '<div class="text-sm text-gray-500">No meals matched.</div>';
                return;
            }

            resultsContainer.innerHTML = results.map(meal =>
            {
                const selected = selectedMeals.has(meal);
                return `
                <article class="meal-box border border-slate-200 bg-white rounded-md p-3 cursor-pointer hover:bg-emerald-50 ${selected ? 'bg-emerald-100 ring-2 ring-emerald-500' : ''}" data-meal-text="${escapeAttr(meal)}">
                    <div class="text-sm whitespace-pre-wrap break-words">${escapeHtml(meal)}</div>
                    <div class="mt-3 flex items-center gap-2">
                        <button type="button" class="mp-btn text-xs px-2 py-1 border border-slate-300 bg-white text-slate-700 hover:bg-slate-100" data-select-meal>${selected ? 'Unselect' : 'Select'}</button>
                        <button type="button" class="mp-btn text-xs px-2 py-1 border border-emerald-300 bg-white text-emerald-900 hover:bg-emerald-50" data-save-one>Copy to Saved meals</button>
                    </div>
                </article>`;
            }).join('');
        }

        let searchRequestId = 0;
        async function runSearch()
        {
            const query = searchInput.value.trim();
            if (!query)
            {
                resultsContainer.innerHTML = '<div class="text-sm text-gray-500">Type to search meals.</div>';
                return;
            }

            const requestId = ++searchRequestId;
            const includeTakeout = includeTakeoutInput.checked;
            const onlyFavorites = onlyFavoritesInput.checked;

            try
            {
                const url = `/api/search?query=${encodeURIComponent(query)}&include_takeout=${includeTakeout}&only_favorites=${onlyFavorites}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Search failed');
                const data = await response.json();
                if (requestId !== searchRequestId) return;
                const results = Array.isArray(data.results) ? data.results.map(x => String(x || '').trim()).filter(Boolean) : [];
                renderResults(results);
            } catch
            {
                if (requestId !== searchRequestId) return;
                resultsContainer.innerHTML = '<div class="text-sm text-red-600">Search failed. Try again.</div>';
            }
        }

        function debounce(fn, wait = 260)
        {
            let t = null;
            return (...args) =>
            {
                clearTimeout(t);
                t = setTimeout(() => fn(...args), wait);
            };
        }

        const debouncedSearch = debounce(runSearch, 260);

        searchForm.addEventListener('submit', (e) =>
        {
            e.preventDefault();
            runSearch();
        });
        searchInput.addEventListener('input', debouncedSearch);
        includeTakeoutInput.addEventListener('change', runSearch);
        onlyFavoritesInput.addEventListener('change', runSearch);

        resultsContainer.addEventListener('click', (event) =>
        {
            const box = event.target.closest('.meal-box');
            if (!box) return;
            const mealText = box.dataset.mealText || '';
            if (!mealText) return;

            if (event.target.closest('[data-save-one]'))
            {
                const added = addMealsToSaved([mealText]);
                showToast(added ? 'Copied to Saved meals' : 'Meal already saved', { type: added ? 'ok' : 'error' });
                return;
            }

            if (selectedMeals.has(mealText)) selectedMeals.delete(mealText);
            else selectedMeals.add(mealText);

            updateSelectedCount();
            const selected = selectedMeals.has(mealText);
            box.classList.toggle('bg-emerald-100', selected);
            box.classList.toggle('ring-2', selected);
            box.classList.toggle('ring-emerald-500', selected);
            const selectBtn = box.querySelector('[data-select-meal]');
            if (selectBtn) selectBtn.textContent = selected ? 'Unselect' : 'Select';
        });

        saveSelectedBtn.addEventListener('click', () =>
        {
            const added = addMealsToSaved(Array.from(selectedMeals));
            if (!selectedMeals.size)
            {
                showToast('No selected meals to copy', { type: 'error' });
                return;
            }

            showToast(added ? `Copied ${added} meal(s) to Saved meals` : 'All selected meals were already saved', { type: added ? 'ok' : 'error' });
            if (selectedMeals.size)
            {
                selectedMeals.clear();
                updateSelectedCount();
                resultsContainer.querySelectorAll('.meal-box').forEach(box =>
                {
                    box.classList.remove('bg-emerald-100', 'ring-2', 'ring-emerald-500');
                    const selectBtn = box.querySelector('[data-select-meal]');
                    if (selectBtn) selectBtn.textContent = 'Select';
                });
            }
        });

        updateSelectedCount();
        updateSavedCount();
        searchInput.focus();
    </script>
</body>

</html>
